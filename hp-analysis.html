<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HP 产品配置分析 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 28px 40px 20px; border-bottom: 1px solid #334155; }
.header h1 { font-size: 1.8em; font-weight: 700; color: #f8fafc; margin-bottom: 6px; }
.header p { color: #94a3b8; font-size: 0.9em; }
.tabs { background: #1e293b; padding: 0 40px; display: flex; gap: 0; border-bottom: 1px solid #334155; }
.tab { padding: 14px 24px; cursor: pointer; color: #94a3b8; font-weight: 500; border-bottom: 2px solid transparent; transition: all 0.2s; font-size: 0.95em; }
.tab:hover { color: #e2e8f0; }
.tab.active { color: #60a5fa; border-color: #3b82f6; }
.content { padding: 24px 40px; }
.section { display: none; }
.section.active { display: block; }
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 24px; }
.card { background: #1e293b; border-radius: 12px; padding: 18px 20px; border: 1px solid #334155; }
.card .label { font-size: 0.75em; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.card .value { font-size: 1.6em; font-weight: 700; color: #f8fafc; }
.card .sub { font-size: 0.8em; color: #94a3b8; margin-top: 4px; }
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.chart-card { background: #1e293b; border-radius: 12px; padding: 18px 20px; border: 1px solid #334155; }
.chart-card h3 { font-size: 0.85em; color: #94a3b8; margin-bottom: 12px; font-weight: 600; }
.chart-wrap { position: relative; height: 240px; }
.chart-card.wide { grid-column: 1 / -1; }
.chart-card.wide .chart-wrap { height: 280px; }
.series-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.series-btn { padding: 8px 16px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #94a3b8; cursor: pointer; font-size: 0.85em; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
.series-btn:hover { border-color: #3b82f6; color: #e2e8f0; }
.series-btn.active { background: #1d4ed8; border-color: #3b82f6; color: white; }
.series-btn .cnt { font-size: 0.8em; opacity: 0.7; }
.series-detail { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; }
.series-header { padding: 16px 20px; background: #0f172a; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
.series-header h2 { font-size: 1em; color: #f8fafc; }
.series-header .badge { background: #3b82f6; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8em; }
.config-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; }
.config-col { padding: 14px 16px; border-right: 1px solid #334155; }
.config-col:last-child { border-right: none; }
.config-col h4 { font-size: 0.7em; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.config-item { padding: 4px 6px; margin-bottom: 3px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8em; }
.config-item:hover { background: #334155; }
.config-item .name { color: #e2e8f0; font-family: 'Consolas', monospace; }
.config-item .count { background: #334155; color: #94a3b8; padding: 1px 6px; border-radius: 4px; font-size: 0.8em; }
.price-row { padding: 12px 20px; background: #0f172a; border-top: 1px solid #334155; display: flex; gap: 24px; flex-wrap: wrap; font-size: 0.82em; }
.price-item { display: flex; gap: 8px; align-items: center; }
.price-item .label { color: #64748b; }
.price-item .val { font-weight: 700; font-family: 'Consolas', monospace; }
.price-item .srp { color: #94a3b8; text-decoration: line-through; }
.price-item .real { color: #4ade80; }
.price-item .cn2 { color: #facc15; }
.search-bar { padding: 14px 40px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.search-bar input { padding: 8px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f8fafc; font-size: 0.88em; outline: none; min-width: 180px; }
.search-bar input:focus { border-color: #3b82f6; }
.search-bar select { padding: 8px 10px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #f8fafc; font-size: 0.85em; outline: none; cursor: pointer; }
.search-stats { color: #64748b; font-size: 0.82em; margin-left: auto; }
.table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #334155; margin-top: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 0.84em; min-width: 900px; }
th { background: #1e293b; color: #64748b; font-weight: 600; text-align: left; padding: 9px 12px; border-bottom: 2px solid #334155; font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
td { padding: 9px 12px; border-bottom: 1px solid #1e293b; vertical-align: middle; }
tr:hover td { background: #1e293b; }
.model-cell { font-weight: 600; color: #f8fafc; font-family: 'Consolas', monospace; font-size: 0.88em; white-space: nowrap; }
.cpu-cell { color: #93c5fd; font-family: 'Consolas', monospace; font-size: 0.88em; }
.tag-amd { display: inline-block; background: #431407; color: #fb923c; padding: 1px 6px; border-radius: 4px; font-size: 0.78em; font-weight: 600; margin-right: 3px; }
.tag-intel { display: inline-block; background: #1e3a5f; color: #93c5fd; padding: 1px 6px; border-radius: 4px; font-size: 0.78em; font-weight: 600; margin-right: 3px; }
.ram-cell { color: #86efac; font-family: 'Consolas', monospace; }
.storage-cell { color: #d8b4fe; font-family: 'Consolas', monospace; }
.gpu-cell { color: #fcd34d; font-family: 'Consolas', monospace; }
.screen-cell { color: #f9a8d4; text-align: center; }
.price-srp { color: #64748b; text-decoration: line-through; font-family: 'Consolas', monospace; }
.price-real { color: #4ade80; font-weight: 700; font-family: 'Consolas', monospace; }
.price-cn2 { color: #facc15; font-family: 'Consolas', monospace; }
.seg-tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 0.75em; font-weight: 600; }
.seg-slim { background: #1e3a3a; color: #5eead4; }
.seg-game { background: #3b1f1f; color: #f87171; }
.seg-premium { background: #1e3a5f; color: #93c5fd; }
.footer { text-align: center; padding: 18px; color: #475569; font-size: 0.78em; border-top: 1px solid #1e293b; margin-top: 20px; }
</style>
</head>
<body>

<div class="header">
  <h1>HP 产品配置分析 2026</h1>
  <p>数据来源：CNB 报价单 &nbsp;|&nbsp; 共 <span id="totalProducts">203</span> 款产品 &nbsp;|&nbsp; 最后更新：2026-04-03</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('overview')">总览</div>
  <div class="tab" onclick="showTab('series')">系列分析</div>
  <div class="tab" onclick="showTab('products')">全部产品</div>
</div>

<!-- 总览 -->
<div class="section active" id="section-overview">
  <div class="content">
    <div class="cards" id="statCards"></div>
    <div class="charts-grid">
      <div class="chart-card">
        <h3>各系列型号数量</h3>
        <div class="chart-wrap"><canvas id="chartSeriesCount"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>CPU 品牌分布</h3>
        <div class="chart-wrap"><canvas id="chartCpuBrand"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>价格分布（实际售价）</h3>
        <div class="chart-wrap"><canvas id="chartPriceDist"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>内存配置分布</h3>
        <div class="chart-wrap"><canvas id="chartRamDist"></canvas></div>
      </div>
    </div>
    <div class="chart-card wide">
      <h3>各系列价格区间对比（实际售价）</h3>
      <div class="chart-wrap"><canvas id="chartSeriesPrice"></canvas></div>
    </div>
  </div>
</div>

<!-- 系列分析 -->
<div class="section" id="section-series">
  <div class="content">
    <div class="series-nav" id="seriesNav"></div>
    <div class="series-detail">
      <div class="series-header">
        <h2 id="seriesTitle">星Book</h2>
        <span class="badge" id="seriesCount">96 款</span>
      </div>
      <div class="config-grid" id="configGrid"></div>
      <div class="price-row" id="priceRow"></div>
    </div>
  </div>
</div>

<!-- 全部产品 -->
<div class="section" id="section-products">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索型号、CPU、系列..." oninput="filterProducts()">
    <select id="filterBrand" onchange="filterProducts()"><option value="">全部 CPU</option><option value="AMD">AMD</option><option value="Intel">Intel</option></select>
    <select id="filterSegment" onchange="filterProducts()"><option value="">全部分类</option><option value="slim">轻薄本</option><option value="gaming">游戏本</option><option value="premium">高端本</option></select>
    <select id="filterSeries" onchange="filterProducts()"><option value="">全部系列</option></select>
    <span class="search-stats" id="searchStats">显示 203 条</span>
  </div>
  <div class="content">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>型号</th><th>CPU</th><th>内存</th><th>硬盘</th><th>显卡</th><th>屏幕</th><th>分类</th><th>标价</th><th>实际售价</th><th>渠道价</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="footer">HP 产品配置分析 · 203 款产品 · 数据来源 CNB</div>

<script>

  starbookpro: { name:'星Book Pro', count:17,
    cpus: {'Core 5-210H':3,'Core 5-220H':4,'Core 9-270H':2,'Ultra 5-225H':2,'Ultra 7-255H':2},

    cpus: {'R5-8640HS':2,'R7-8840HS':5,'R7-8840H':1,'Ultra 5 125U':2,'Ultra 7 155U':2,'Ultra 7 155U':1},
    rams: {'16G':9,'32G':4},

  pavilionx360: { name:'Pavilion x360', count:3,
    cpus: {'Core 3-100U':1,'Core 5-120U':1,'Core 7-150U':1},
    rams: {'8G':1,'16G':2},

    screens: {'14.0"':3},
    srp_range:[3899,5799], real_range:[3899,6199], cn2_range:[3,5] }
};

// ─── INIT ───
async function loadData() {
  try {
    const resp = await fetch('https://raw.githubusercontent.com/weiliang1001/hp-roadmap/main/products_data.js');
    const text = await resp.text();
    const jsonMatch = text.match(/const HP_PRODUCTS = ([\s\S]*?);/);
    if (!jsonMatch) { initCharts(); initSeries(); initProducts(); return; }
    try { const data = eval(jsonMatch[1]); ALL_PRODUCTS.push(...data); } catch(e) {}
    filteredProducts = [...ALL_PRODUCTS];
    initCharts();
    initSeries();
    initProducts();
    document.getElementById('totalProducts').textContent = ALL_PRODUCTS.length || 203;
  } catch(e) {
    initCharts(); initSeries(); initProducts();
    document.getElementById('totalProducts').textContent = '203';
  }
}

// ─── TABS ───
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelector(`.tab[onclick="showTab('${name}')"]`).classList.add('active');
  document.getElementById('section-' + name).classList.add('active');
}

// ─── STAT CARDS ───
function buildStatCards() {
  const gamingCount = (SERIES_MAP.omen?.count||0) + (SERIES_MAP.victus?.count||0) + (SERIES_MAP.omenslim?.count||0) + (SERIES_MAP.omenmax?.count||0);
  const premiumCount = (SERIES_MAP.envy?.count||0) + (SERIES_MAP.spectre?.count||0) + (SERIES_MAP.pavilionplus?.count||0) + (SERIES_MAP.starbookpro?.count||0);
  const slimCount = 203 - gamingCount - premiumCount;
  const cards = [
    {label:'总型号数', value:'203', sub:'共11个系列'},
    {label:'轻薄本', value: slimCount, sub:'星Book系列为主'},
    {label:'游戏本', value: gamingCount, sub:'OMEN+Victus'},
    {label:'高端本', value: premiumCount, sub:'ENVY+Spectre+Pavilion'},
    {label:'价格区间', value:'¥2,549起', sub:'最高 ¥24,999'},
    {label:'AMD 占比', value:'~45%', sub:'R5/R7/AI系列'},
  ];
  document.getElementById('statCards').innerHTML = cards.map(c =>
    `<div class="card"><div class="label">${c.label}</div><div class="value">${c.value}</div><div class="sub">${c.sub}</div></div>`
  ).join('');
}

// ─── CHARTS ───
let charts = {};
const PALETTE = ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#f97316','#84cc16','#6366f1','#14b8a6'];

function destroyCharts() { Object.values(charts).forEach(c => c.destroy()); charts = {}; }

function initCharts() {
  destroyCharts();
  buildStatCards();
  buildSeriesCountChart();
  buildCpuBrandChart();
  buildPriceDistChart();
  buildRamDistChart();
  buildSeriesPriceChart();
}

function makeChart(id, type, data, options) {
  const ctx = document.getElementById(id).getContext('2d');
  charts[id] = new Chart(ctx, { type, data, options });
}

function buildSeriesCountChart() {
  const keys = Object.keys(SERIES_MAP);
  const labels = keys.map(k => SERIES_MAP[k].name);
  const data = keys.map(k => SERIES_MAP[k].count);
  makeChart('chartSeriesCount', 'bar', {
    labels,
    datasets: [{ data, backgroundColor: PALETTE, borderRadius: 6, borderSkipped: false }]
  }, {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', stepSize: 10 } },
      x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 }, maxRotation: 30 } }
    }
  });
}

function buildCpuBrandChart() {
  const amd = Object.entries(SERIES_MAP).filter(([k]) => ['starbook','envy','victus'].includes(k)).reduce((s,[,d]) => s + d.count, 0);
  const intel = 203 - amd;
  makeChart('chartCpuBrand', 'doughnut', {
    labels: ['AMD', 'Intel'],
    datasets: [{ data: [amd, intel], backgroundColor: ['#f97316','#3b82f6'], borderWidth: 0 }]
  }, {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 14 } } }
  });
}

function buildPriceDistChart() {
  makeChart('chartPriceDist', 'bar', {
    labels: ['<¥3000','¥3-5K','¥5-7K','¥7-10K','>¥10K'],
    datasets: [{ data: [12,35,48,55,53], backgroundColor: ['#10b981','#3b82f6','#8b5cf6','#f59e0b','#ef4444'], borderRadius: 6, borderSkipped: false }]
  }, {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: { y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }, x: { grid: { display: false }, ticks: { color: '#94a3b8' } } }
  });
}

function buildRamDistChart() {
  const ramData = {'8G':5,'16G':95,'24G':8,'32G':83,'64G':4};
  makeChart('chartRamDist', 'bar', {
    labels: Object.keys(ramData),
    datasets: [{ data: Object.values(ramData), backgroundColor: PALETTE, borderRadius: 6, borderSkipped: false }]
  }, {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: { y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } }, x: { grid: { display: false }, ticks: { color: '#94a3b8' } } }
  });
}

function buildSeriesPriceChart() {
  const keys = ['starbook','starbookultra','starbookpro','victus','omenslim','omenmax','spectre','envy'];
  const labels = keys.map(k => SERIES_MAP[k].name);
  const minData = keys.map(k => SERIES_MAP[k].real_range[0]);
  const maxData = keys.map(k => SERIES_MAP[k].real_range[1]);
  makeChart('chartSeriesPrice', 'bar', {
    labels,
    datasets: [
      { label: '最低价', data: minData, backgroundColor: '#1d4ed8', borderRadius: 4 },
      { label: '最高价', data: maxData, backgroundColor: '#3b82f6', borderRadius: 4 }
    ]
  }, {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', callback: v => '¥' + v.toLocaleString() } },
      x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 }, maxRotation: 30 } }
    }
  });
}

// ─── SERIES ───
function initSeries() {
  const nav = document.getElementById('seriesNav');
  const keys = Object.keys(SERIES_MAP);
  nav.innerHTML = keys.map(sk =>
    `<button class="series-btn${sk === 'starbook' ? ' active' : ''}" onclick="showSeries('${sk}')">
      ${SERIES_MAP[sk].name}<span class="cnt">${SERIES_MAP[sk].count}</span>
    </button>`
  ).join('');

  // Populate series filter
  document.getElementById('filterSeries').innerHTML = '<option value="">全部系列</option>' +
    keys.map(sk => `<option value="${sk}">${SERIES_MAP[sk].name}</option>`).join('');

  showSeries('starbook');
}

function showSeries(sk) {
  document.querySelectorAll('.series-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.series-btn[onclick="showSeries('${sk}')"]`).classList.add('active');
  const d = SERIES_MAP[sk];
  document.getElementById('seriesTitle').textContent = d.name;
  document.getElementById('seriesCount').textContent = d.count + ' 款';

  const fy = v => v === 0 ? '-' : '¥' + v.toLocaleString();
  const fy2 = (a, b) => a === b ? fy(a) : fy(a) + ' ~ ' + fy(b);

  const cols = [
    {title:'CPU', data: d.cpus},
    {title:'内存', data: d.rams},
    {title:'硬盘', data: d.storages},
    {title:'显卡', data: d.gpus},
    {title:'屏幕', data: d.screens},
  ];
  document.getElementById('configGrid').innerHTML = cols.map(col => {
    const items = Object.entries(col.data).sort((a,b) => b[1]-a[1]).slice(0, 7);
    return `<div class="config-col">
      <h4>${col.title}</h4>
      ${items.map(([n,c]) => `<div class="config-item"><span class="name">${n}</span><span class="count">${c}</span></div>`).join('')}
    </div>`;
  }).join('');

  document.getElementById('priceRow').innerHTML = `
    <div class="price-item"><span class="label">标价区间</span><span class="val srp">${fy2(d.srp_range[0], d.srp_range[1])}</span></div>
    <div class="price-item"><span class="label">实际售价区间</span><span class="val real">${fy2(d.real_range[0], d.real_range[1])}</span></div>
    <div class="price-item"><span class="label">渠道价区间</span><span class="val cn2">${fy2(d.cn2_range[0], d.cn2_range[1])}</span></div>
  `;
}

// ─── ALL PRODUCTS ───
function initProducts() { renderProducts(ALL_PRODUCTS.length ? ALL_PRODUCTS : []); }

function filterProducts() {
  const kw = document.getElementById('searchInput').value.toLowerCase();
  const brand = document.getElementById('filterBrand').value;
  const seg = document.getElementById('filterSegment').value;
  const series = document.getElementById('filterSeries').value;
  const src = ALL_PRODUCTS.length ? ALL_PRODUCTS : [];
  filteredProducts = src.filter(p => {
    if (kw && !p.model?.toLowerCase().includes(kw) && !p.series?.toLowerCase().includes(kw) && !p.cpu?.toLowerCase().includes(kw)) return false;
    if (brand && p.cpuBrand !== brand) return false;
    if (seg && p.segment !== seg) return false;
    if (series && p.seriesKey !== series) return false;
    return true;
  });
  renderProducts(filteredProducts);
}

function renderProducts(products) {
  document.getElementById('searchStats').textContent = '显示 ' + products.length + ' 条';
  const tbody = document.getElementById('tableBody');
  if (!products.length) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;color:#64748b">暂无数据（需要网络加载）</td></tr>';
    return;
  }
  tbody.innerHTML = products.map(p => {
    const brandTag = p.cpuBrand === 'AMD' ? '<span class="tag-amd">AMD</span>' : '<span class="tag-intel">Intel</span>';
    const segClass = {slim:'seg-slim',gaming:'seg-game',premium:'seg-premium'}[p.segment] || '';
    const segLabel = {slim:'轻薄本',gaming:'游戏本',premium:'高端本'}[p.segment] || p.segment || '';
    const gpu = p.gpu || 'UMA';
    const screen = p.screen ? (p.screen + (p.screen.includes('"') ? '' : '"')) : '-';
    const srp = p.srp ? '¥' + p.srp.toLocaleString() : '-';
    const real = p.real ? '¥' + p.real.toLocaleString() : '-';
    const cn2 = p.cn2 ? '¥' + (typeof p.cn2 === 'number' ? p.cn2.toLocaleString() : p.cn2) : '-';
    return `<tr>
      <td class="model-cell">${p.model || '-'}</td>
      <td class="cpu-cell">${brandTag} ${p.cpu || '-'}</td>
      <td class="ram-cell">${p.ram || '-'}</td>
      <td class="storage-cell">${p.storage || '-'}</td>
      <td class="gpu-cell">${gpu}</td>
      <td class="screen-cell">${screen}</td>
      <td><span class="seg-tag ${segClass}">${segLabel}</span></td>
      <td class="price-srp">${srp}</td>
      <td class="price-real">${real}</td>
      <td class="price-cn2">${cn2}</td>
    </tr>`;
  }).join('');
}

document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
